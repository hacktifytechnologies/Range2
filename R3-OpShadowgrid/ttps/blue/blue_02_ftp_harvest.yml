- name: 'NovaTech: Anonymous FTP Credential Harvesting'
  id: b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7
  description: >-
    Simulates an attacker logging into the FTP server with anonymous credentials,
    listing the directory, and downloading sensitive files including a staff handover
    document containing SSH credentials for the next hop.
    Generates entries in vsftpd.log for blue team analysis.
  tactic: credential-access
  technique_id: T1078.001
  technique_name: 'Valid Accounts: Default Accounts'
  singleton: false
  repeatable: true
  delete_payload: false
  executors:
    - name: sh
      platform: linux
      command: |
        echo "[*] Simulating anonymous FTP access on nova-ftpvault"
        ls -la /srv/ftp/ 2>/dev/null
        echo "[*] Harvesting files from FTP share"
        cp /srv/ftp/staff_handover.txt /tmp/harvested_handover.txt 2>/dev/null || echo "staff_handover.txt not accessible via direct copy - use FTP client"
        cp /srv/ftp/flag2.txt /tmp/harvested_flag2.txt 2>/dev/null || true
        echo "[!] Anonymous FTP access simulated - credential file exfiltrated" >> /var/log/vsftpd.log
        echo "$(date) [ANONYMOUS LOGIN OK FROM 11.0.0.100]" >> /var/log/vsftpd.log
        echo "$(date) [DOWNLOAD staff_handover.txt bytes=312 FROM 11.0.0.100]" >> /var/log/vsftpd.log
        cat /tmp/harvested_handover.txt 2>/dev/null
        echo "[*] Credential harvesting complete"
      code: null
      language: null
      build_target: null
      payloads: []
      uploads: []
      timeout: 60
      parsers: []
      cleanup:
        - rm -f /tmp/harvested_handover.txt /tmp/harvested_flag2.txt
      variations: []
      additional_info: {}
  requirements: []
